<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>合成大拯救 · 像素闯关版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="corner-logos" aria-hidden="true">
        <img class="corner-logo" src="assets/logos/logo_igem.png" alt="">
        <img class="corner-logo" src="assets/logos/logo_csph.png" alt="">
        <img class="corner-logo" src="assets/logos/logo_sph_jlu.jpg" alt="">
        <img class="corner-logo" src="assets/logos/logo_cst_jlu.jpg" alt="">
    </div>

    <div class="page-shell">
        <header class="hud">
            <div class="hud-card">
                <span class="hud-label">积分</span>
                <span id="score" class="hud-value">0</span>
            </div>
            <div class="title-block">
                <h1>合成大拯救</h1>
                <p>精致像素闯关版 · 收集上方卡片，凑齐 3 张同类即可消除</p>
            </div>
            <div class="hud-card">
                <span class="hud-label">关卡</span>
                <span id="level-text" class="hud-value">1 / 3</span>
            </div>
        </header>

        <section class="panel info-panel">
            <div class="info-copy">
                <span class="pixel-tag">玩法提示</span>
                <p>被上层遮住的卡片会进入“待解锁”状态；合理规划槽位，连续消除更轻松。</p>
            </div>
            <div id="stage-dots" class="stage-dots" aria-label="关卡进度"></div>
        </section>

        <main class="game-shell">
            <div id="game-board" aria-label="游戏主区域"></div>
        </main>

        <section class="slot-shell">
            <div class="slot-title">收纳槽</div>
            <div id="slot-area"></div>
        </section>
    </div>

    <div id="toast" class="toast hidden">科普知识会出现在这里</div>

    <div id="game-over-screen" class="overlay hidden">
        <div class="overlay-card">
            <div class="overlay-badge">PIXEL CLEAR</div>
            <h2 id="game-over-msg">实验结果</h2>
            <p id="game-over-submsg">继续努力，下一次一定能顺利完成实验！</p>
            <div class="overlay-actions">
                <button id="primary-btn" class="pixel-btn">继续</button>
                <button id="restart-btn" class="pixel-btn secondary-btn">重新开始</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
